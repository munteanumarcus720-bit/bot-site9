<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght=600;800&display=swap" rel="stylesheet">

<style>
html,body{
    margin:0;
    padding:0;
    height:100%;
    background:#0b0b0c;
    font-family:'Inter',Arial;
    color:white;
    overflow:hidden;
}

/* 🔥 GRID */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        linear-gradient(rgba(0,255,150,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,150,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
}

/* CENTER + SCALE */
.container{
    position: relative;
    z-index: 2;

    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    transform: scale(1.2);
}

/* TEXT */
.title{font-size:18px;font-weight:800;}
.subtitle{font-size:12px;opacity:.6;margin-bottom:20px;}

/* 🐔 */
.chicken{
    width:110px;
    margin:10px 0;
    transform: rotate(-8deg);
    animation: float 2s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0) rotate(-8deg);}
    50%{transform:translateY(-8px) rotate(-8deg);}
}

/* STATE */
.state{
    font-size:18px;
    opacity:.7;
    margin-bottom:10px;
}

/* 🔥 LOADER WRAP */
.loaderWrap{
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    margin:30px 0;
}

/* 🔥 LOADER CLASIC UPGRADED */
.loader{
    width:80px;
    height:80px;

    border-radius:50%;
    border:6px solid rgba(255,255,255,0.15);
    border-top:6px solid #ffffff;

    animation:spin 0.9s linear infinite;

    filter: drop-shadow(0 0 6px rgba(255,255,255,0.4));
}

/* 🔥 TEXT LOADING */
.loadingText{
    margin-top:14px;
    font-size:20px;
    font-weight:600;
    letter-spacing:0.5px;
    opacity:0.9;

    animation:fadePulse 1.5s ease-in-out infinite;
}

.loadingText::after{
    content:"...";
    animation:dots 1.5s steps(3,end) infinite;
}

@keyframes dots{
    0%{content:".";}
    33%{content:"..";}
    66%{content:"...";}
}

/* CIRCLE */
.circle{
    width:170px;
    aspect-ratio:1/1;
    display:none;
    align-items:center;
    justify-content:center;
    position:relative;
    margin-bottom:20px;
}

.circle img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* TEXT PE CERC */
.circle span{
    position:absolute;
    top:46%;
    left:49%;
    transform:translate(-50%, -50%);
    font-size:34px;
    font-weight:800;
    color:#ffffff;

    text-shadow:
        0 0 6px rgba(255,255,255,0.8),
        0 0 12px rgba(255,255,255,0.4);
}

/* BUTTON */
.button{
    width:260px;
    padding:15px;
    border-radius:14px;
    background:#34c759;
    text-align:center;
    font-weight:800;
    margin-top:10px;

    box-shadow:0 5px 15px rgba(52,199,89,0.3);
}

/* LEVEL */
.level-title{
    margin-top:15px;
    font-size:14px;
    opacity:.6;
}

.levels{
    margin-top:10px;
    display:grid;
    grid-template-columns:repeat(2,120px);
    gap:10px;
}

.levels button{
    padding:12px;
    border-radius:12px;
    border:none;
    background:#3a3a3c;
    color:white;
    font-weight:600;
}

.active{
    background:#ffd60a !important;
    color:black;
}

/* ANIMATIONS */
@keyframes spin{
    to{transform:rotate(360deg);}
}

@keyframes fadePulse{
    0%,100%{opacity:0.6;}
    50%{opacity:1;}
}
</style>
</head>

<body>

<div class="container">

<div class="title">HACK BOT</div>
<div class="subtitle">AI Soft v2.0</div>

<img id="chicken" class="chicken" src="chicken.png">

<div id="state" class="state">Ready...</div>

<!-- 🔥 LOADER -->
<div id="loaderWrap" class="loaderWrap">
    <div class="loader"></div>
    <div class="loadingText">Loading</div>
</div>

<div id="circle" class="circle">
    <img src="circle.png">
    <span id="result">2.00x</span>
</div>

<div class="button" onclick="predict()">PREDICT</div>

<div class="level-title">Level:</div>

<div class="levels">
<button onclick="setLevel('easy')">Easy</button>
<button onclick="setLevel('medium')" class="active">Medium</button>
<button onclick="setLevel('hard')">Hard</button>
<button onclick="setLevel('hardcore')">Hardcore</button>
</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let level="medium";

function setLevel(l){
    level=l;
    document.querySelectorAll(".levels button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");
}

const data={
    easy:["1.3x","1.6x"],
    medium:["1.4x","1.7x","2.2x"],
    hard:["2.3x","3.1x"],
    hardcore:["1.4x","2.2x","5.0x"]
};

function predict(){
    let chicken=document.getElementById("chicken");
    let state=document.getElementById("state");
    let loader=document.getElementById("loaderWrap");
    let circle=document.getElementById("circle");
    let result=document.getElementById("result");

    chicken.style.display="none";
    circle.style.display="none";

    state.innerText="";
    loader.style.display="flex";

    setTimeout(()=>{
        loader.style.display="none";
        circle.style.display="flex";

        let arr=data[level];
        let random=arr[Math.floor(Math.random()*arr.length)];

        result.innerText=random;
    },1500);
}
</script>

</body>
</html>
